name: Build
on:
  push:
    branches:
      - "**"

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Dùng JDK 17 để cài các công cụ Android ban đầu
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Tự tay cài đặt Android SDK qua cmdline-tools (Bypass setup-android action)
      - name: Install Android SDK Manually
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          curl -L https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline.zip
          unzip -q cmdline.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --licenses --sdk_root=$ANDROID_HOME
          sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-19" "build-tools;25.0.3" "platform-tools"

      # Bây giờ mới hạ xuống JDK 8 để build app
      - name: Set up JDK 8 for Gradle
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 12

      - name: Download NDK r17b
        run: |
          curl -L -o android-ndk-r17b-linux-x86_64.zip https://dl.google.com/android/repository/android-ndk-r17b-linux-x86_64.zip
          unzip -q android-ndk-r17b-linux-x86_64.zip -d $HOME/android-ndk
          rm android-ndk-r17b-linux-x86_64.zip

      - name: Set Environment & Local Properties
        run: |
          echo "NDK_HOME=$HOME/android-ndk/android-ndk-r17b" >> $GITHUB_ENV
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          mkdir -p telon-gateway-app/android
          echo "ndk.dir=$HOME/android-ndk/android-ndk-r17b" > telon-gateway-app/android/local.properties
          echo "sdk.dir=$HOME/android-sdk" >> telon-gateway-app/android/local.properties

      - name: Install Dependencies
        run: npm install
        working-directory: telon-gateway-app

      - name: Build Android Assets
        run: |
          mkdir -p android/app/build/intermediates/assets/release/
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/build/intermediates/assets/release/index.android.bundle --assets-dest android/app/build/intermediates/res/merged/release
        working-directory: telon-gateway-app

      - name: Build Android Release
        run: |
          cd android
          chmod +x gradlew 
          ./gradlew assembleRelease --no-daemon
        working-directory: telon-gateway-app

      - name: Archive APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: telon-gateway-app/android/app/build/outputs/apk/release/*.apk
